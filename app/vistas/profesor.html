{% extends "index.html" %}
{% block title %}Panel del profesor{% endblock %}
{% block content %}
<section>
    <h2>Gestión de notas</h2>

    <form id="form-nota">
        <label for="estudiante">Estudiante</label>
        <select id="estudiante" name="estudiante_id"></select>

        <label for="materia">Materia</label>
        <select id="materia" name="materia_id"></select>

        <label for="periodo">Periodo</label>
        <input type="text" id="periodo" name="periodo" placeholder="Ej: 2026-1">

        <label for="nota">Nota</label>
        <input type="number" id="nota" name="nota" min="0" max="5" step="0.1">

        <button type="submit">Guardar</button>
    </form>

    <table id="tabla-notas-profesor">
        <thead>
            <tr>
                <th>Estudiante</th>
                <th>Materia</th>
                <th>Periodo</th>
                <th>Nota</th>
                <th>Acciones</th>
            </tr>
        </thead>
        <tbody>
            <!-- TODO (compañero 3): CRUD completo - insertar, editar, eliminar -->
        </tbody>
    </table>
</section>
{% endblock %}
