{% extends "index.html" %}
{% block title %}Iniciar sesión{% endblock %}
{% block content %}
<section class="login-layout">
    <div class="login-image">
        <img src="{{ url_for('static', filename='imagenes/universitarios.jpg') }}" alt="Estudiantes y profesores">
    </div>

    <div class="login-panel">
        <h2>Iniciar sesión</h2>
        <p class="login-subtitle">Accede a tu cuenta para consultar o registrar notas.</p>

        {% if error %}
        <p class="error">{{ error }}</p>
        {% endif %}

        <form action="{{ url_for('login') }}" method="POST">
            <label for="username">Usuario</label>
            <input type="text" id="username" name="username" required autofocus>

            <label for="password">Contraseña</label>
            <input type="password" id="password" name="password" required>

            <button type="submit">Ingresar</button>
        </form>

        <a href="{{ url_for('home') }}" class="btn-volver-login">Volver</a>
    </div>
</section>
{% endblock %}
