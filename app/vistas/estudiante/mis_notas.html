{% extends "index.html" %}
{% block title %}Mis Notas{% endblock %}
{% block content %}
<section style="position: relative;">
    <a href="{{ url_for('menu_estudiante') }}" class="btn-volver-superior">← Volver</a>
    <div class="titulo-con-imagen">
        <h2>Mis notas</h2>
        <img src="{{ url_for('static', filename='imagenes/cuaderno.png') }}" alt="Mis notas" class="icono-pequeno">
    </div>
    <div class="cuadro-tabla">
        <table id="tabla-notas">
            <thead>
                <tr>
                    <th>Materia</th>
                    <th>Periodo</th>
                    <th>Tipo</th>
                    <th>Porcentaje</th>
                    <th>Nota</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla-notas">
                <tr><td colspan="5">Cargando...</td></tr>
            </tbody>
        </table>
    </div>

    <h2 style="margin-top: 40px;">Definitivas por materia</h2>
    <div class="cuadro-tabla">
        <table id="tabla-definitivas">
            <thead>
                <tr>
                    <th>Materia</th>
                    <th>Periodo</th>
                    <th>Definitiva</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla-definitivas">
                <tr><td colspan="3">Cargando...</td></tr>
            </tbody>
        </table>
    </div>
</section>
{% endblock %}
