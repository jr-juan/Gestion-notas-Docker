{% extends "index.html" %}
{% block title %}Mis Notas{% endblock %}
{% block content %}
<section>
    <div class="titulo-con-imagen">
        <h2>Mis notas</h2>
        <img src="{{ url_for('static', filename='imagenes/cuaderno.png') }}" alt="Mis notas" class="icono-pequeno">
    </div>
    <div class="cuadro-tabla">
        <table id="tabla-notas">
            <thead>
                <tr>
                    <th>Materia</th>
                    <th>Periodo</th>
                    <th>Tipo</th>
                    <th>Porcentaje</th>
                    <th>Nota</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla-notas">
                <tr><td colspan="5">Cargando...</td></tr>
            </tbody>
        </table>
    </div>

    <h2>Definitivas por materia</h2>
    <div class="cuadro-tabla">
        <table id="tabla-definitivas">
            <thead>
                <tr>
                    <th>Materia</th>
                    <th>Periodo</th>
                    <th>Definitiva</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla-definitivas">
                <tr><td colspan="3">Cargando...</td></tr>
            </tbody>
        </table>
    </div>

    <div style="text-align: center; margin-top: 30px;">
        <a href="{{ url_for('menu_estudiante') }}" style="display: inline-block; background: #95a5a6; color: white; padding: 12px 30px; border-radius: 5px; text-decoration: none; font-weight: bold; transition: background 0.3s;">Volver al Menú</a>
    </div>
</section>
{% endblock %}
