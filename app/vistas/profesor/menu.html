{% extends "index.html" %}
{% block title %}Menú Profesor{% endblock %}
{% block content %}
<section>
    <div class="menu-bienvenida">
        <h2>Bienvenido, {{ session.get('nombre') or 'Profesor' }}</h2>
        <p>Selecciona una opción para continuar</p>
    </div>
    <ul class="menu-opciones">
        <li>
            <a href="{{ url_for('vista_registrar') }}">
                <img src="{{ url_for('static', filename='iconos/calificar.png') }}" alt="Registrar nota">
                <span>Registrar nota</span>
            </a>
        </li>
        <li>
            <a href="{{ url_for('vista_gestionar') }}">
                <img src="{{ url_for('static', filename='iconos/calificaciones.png') }}" alt="Gestionar notas">
                <span>Gestionar notas</span>
            </a>
        </li>
    </ul>
</section>
{% endblock %}
