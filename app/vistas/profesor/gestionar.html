{% extends "index.html" %}
{% block title %}Gestionar Notas{% endblock %}
{% block content %}
<section>
    <div id="contenedor-editar" class="cuadro-formulario" style="display:none;">
        <h2>Editar nota</h2>
        <form id="form-editar-nota">
            <input type="hidden" id="nota_id" value="">

            <label for="periodo">Periodo</label>
            <input type="text" id="periodo" required>

            <label for="tipo_nota">Tipo de nota</label>
            <select id="tipo_nota" required>
                <option value="Parcial 1">Parcial 1</option>
                <option value="Parcial 2">Parcial 2</option>
                <option value="Seguimiento">Seguimiento</option>
                <option value="Examen Final">Examen Final</option>
            </select>

            <label for="porcentaje">Porcentaje</label>
            <input type="number" id="porcentaje" min="0.01" max="100" step="0.01" required>

            <label for="nota">Nota</label>
            <input type="number" id="nota" min="0" max="100" step="0.01" required>

            <button type="submit">Actualizar</button>
            <button type="button" id="btn-cancelar">Cancelar</button>
        </form>
    </div>
    <p id="mensaje"></p>

    <div id="contenedor-tabla" class="cuadro-tabla">
        <h2>Notas registradas</h2>
        <table id="tabla-notas-profesor">
            <thead>
                <tr>
                    <th>Estudiante</th>
                    <th>Materia</th>
                    <th>Periodo</th>
                    <th>Tipo</th>
                    <th>Porcentaje</th>
                    <th>Nota</th>
                    <th>Acciones</th>
                </tr>
            </thead>
            <tbody id="cuerpo-tabla-notas-profesor">
                <tr><td colspan="7">Cargando...</td></tr>
            </tbody>
        </table>
    </div>

    <div style="text-align: center; margin-top: 30px;">
        <a href="{{ url_for('menu_profesor') }}" style="display: inline-block; background: #95a5a6; color: white; padding: 12px 30px; border-radius: 5px; text-decoration: none; font-weight: bold; transition: background 0.3s;">Volver al Menú</a>
    </div>
</section>
{% endblock %}
